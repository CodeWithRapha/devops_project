name: CI-CD

on:
 push:
  branches: [ main ]

jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - name: Checkout
    uses: actions/checkout@v3

  - name: Setup Java
    uses: actions/setup-java@v3
    with:
     java-version: '17'
     distribution: 'temurin'

  - name: Build
    run: mvn clean package

  - name: Test
    run: mvn test

  - name: Docker Build
    run: docker build -t esg-api .
