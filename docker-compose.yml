version: '3.8'

services:

 api:
  build: .
  ports:
   - "8080:8080"
  env_file:
   - .env
   environment:
    DB_HOST: ${DB_HOST}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}
    DB_NAME: ${DB_NAME}
  depends_on:
   - db
  networks:
   - esg_network


 db:
  image: postgres
  container_name: esg-db
  environment:
   POSTGRES_DB: esg
   POSTGRES_USER: postgres
   POSTGRES_PASSWORD: postgres
  ports:
   - "5432:5432"
