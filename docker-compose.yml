version: '3.8'

services:
 api:
  build: .
  container_name: esg-api
  ports:
   - "8080:8080"
  env_file:
   - .env
  environment:
   DB_HOST: ${DB_HOST:-db}
   DB_USER: ${DB_USER}
   DB_PASSWORD: ${DB_PASSWORD}
   DB_NAME: ${DB_NAME}
  depends_on:
   - db
  networks:
   - esg_network

 db:
  image: postgres:15
  container_name: esg-db
  environment:
   POSTGRES_DB: ${DB_NAME}
   POSTGRES_USER: ${DB_USER}
   POSTGRES_PASSWORD: ${DB_PASSWORD}
  ports:
   - "5432:5432"
  volumes:
   - postgres_data:/var/lib/postgresql/data
  networks:
   - esg_network

volumes:
 postgres_data:

networks:
 esg_network:
  driver: bridge